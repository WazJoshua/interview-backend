name: intelligent-interview-stack

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    env_file:
      - ./env/infra.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7.4.7
    restart: unless-stopped
    env_file:
      - ./env/infra.env
    command:
      - /bin/sh
      - -c
      - exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:management
    restart: unless-stopped
    env_file:
      - ./env/infra.env
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    image: ${IMAGE_REPO:-ghcr.io/example/interview-backend}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./env/backend.env
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:/app/config/
      JAVA_TOOL_OPTIONS: >-
        -Xlog:gc*,safepoint:stdout:time,uptime,level,tags
    ports:
      - "8773:8773"
    volumes:
      - ./uploads:/app/uploads
      - ./config:/app/config:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
